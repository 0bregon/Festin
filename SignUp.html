<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Festín</title>
    <link href="estilo.css" rel="stylesheet">

    <script src="script.js" defer></script>
</head>
<body>

    <header class="encabezado">
        <h1>Crear Cuenta</h1>
        <p>Regístrate para gestionar tus reservas y pedidos</p>
    </header>

    <main>

        <section class="seccion">

            <form action="perfil.html" method="POST" class="busqueda">

                <div>
                    <label for="nombre">Nombre completo</label><br>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                </div>

                <br>

                <div>
                    <label for="email">Correo electrónico</label><br>
                    <input type="email" id="email" name="email" placeholder="ejemplo@email.com" required>
                </div>

                <br>

                <div>
                    <label for="password">Contraseña</label><br>
                    <input type="password" id="password" name="password" required>
                </div>

                <br>

                <div>
                    <label for="confirmar">Confirmar contraseña</label><br>
                    <input type="password" id="confirmar" name="confirmar" required>
                </div>

                <br>

                <button type="submit">Crear cuenta</button>

            </form>

        </section>

        <hr>

        <section class="seccion">
            <p>¿Ya tienes una cuenta?</p>
            <a href="login.html">Iniciar sesión</a>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Festín Panamá</p>
    </footer>

</body>
</html>
