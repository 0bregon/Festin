<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Festín</title>
    <link href="estilo.css" rel="stylesheet">
</head>
<body>

    <header class="encabezado">
        <h1>Iniciar Sesión</h1>
        <p>Accede a tu cuenta para gestionar reservas y pedidos</p>
        <p>¿No tienes cuenta?</p>
        <a href="SignUp.html">Crear cuenta</a>
    </header>

    <main>

        <section class="seccion">
            <br>
            <form action="perfil.html" method="POST" class="busqueda">

                <div>
                    <label for="email">Correo electrónico</label><br>
                    <input type="email" id="email" name="email" placeholder="ejemplo@email.com" required>
                </div>

                <br>

                <div>
                    <label for="password">Contraseña</label><br>
                    <input type="password" id="password" name="password" required>
                </div>

                <br>

                <button type="submit">Iniciar sesión</button>

            </form>
        </section>

        <hr>

        <section class="seccion">
            
        </section>

    </main>

    <footer>
        <p>&copy; 2026 Festín Panamá</p>
    </footer>

</body>
</html>
